name: Build OpenWrt package

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      full_matrix:
        description: "Also build OpenWrt 23.05 packages"
        type: boolean
        default: false
      publish_release:
        description: "Publish/update GitHub Release with IPKs"
        type: boolean
        default: true

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  # -------------------------------------------------------------------------
  # 1) Cross-compile geoextract (Rust) — static musl, vendored crates
  # -------------------------------------------------------------------------
  rust:
    name: rust ${{ matrix.rust_target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: x86_64-unknown-linux-musl
            docker_tag: x86_64-musl
            artifact: geoextract-x86_64
          - rust_target: aarch64-unknown-linux-musl
            docker_tag: aarch64-musl
            artifact: geoextract-aarch64
          - rust_target: armv7-unknown-linux-musleabihf
            docker_tag: armv7-musleabihf
            artifact: geoextract-armv7

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: route-profiles/geoextract/target
          key: geoextract-${{ matrix.rust_target }}-${{ hashFiles('route-profiles/geoextract/Cargo.lock') }}
          restore-keys: |
            geoextract-${{ matrix.rust_target }}-

      - name: Build static musl binary
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/route-profiles/geoextract:/home/rust/src" \
            -w /home/rust/src \
            "messense/rust-musl-cross:${{ matrix.docker_tag }}" \
            cargo build --release --offline --target "${{ matrix.rust_target }}"
          BIN="route-profiles/geoextract/target/${{ matrix.rust_target }}/release/route-profiles-geoextract"
          test -x "$BIN"
          ls -lh "$BIN"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: route-profiles/geoextract/target/${{ matrix.rust_target }}/release/route-profiles-geoextract
          if-no-files-found: error
          retention-days: 7

  # -------------------------------------------------------------------------
  # 2) OpenWrt SDK → .ipk (prebuilt geoextract; no rustup in SDK)
  # -------------------------------------------------------------------------
  package:
    name: ipk ${{ matrix.arch }} / ${{ matrix.version }}
    needs: rust
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 (VMs / x86 routers)
          - version: "24.10.5"
            arch: x86_64
            rust_artifact: geoextract-x86_64
          # Filogic / MediaTek aarch64 (e.g. Banana Pi R3/R4)
          - version: "24.10.5"
            arch: aarch64_cortex-a53
            rust_artifact: geoextract-aarch64
          # Generic aarch64
          - version: "24.10.5"
            arch: aarch64_generic
            rust_artifact: geoextract-aarch64
          # Common 32-bit ARM (mt7621-class etc.)
          - version: "24.10.5"
            arch: arm_cortex-a7_neon-vfpv4
            rust_artifact: geoextract-armv7

    steps:
      - uses: actions/checkout@v4

      - name: Fetch prebuilt geoextract
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.rust_artifact }}
          path: prebuilt-dl

      - name: Stage prebuilt for Makefile
        run: |
          set -euo pipefail
          BIN="$(find prebuilt-dl -type f -name 'route-profiles-geoextract' | head -1)"
          test -n "$BIN" && test -f "$BIN"
          # Package source is route-profiles/; Makefile looks for ./prebuilt/ next to it
          mkdir -p route-profiles/prebuilt
          cp "$BIN" route-profiles/prebuilt/route-profiles-geoextract
          chmod 755 route-profiles/prebuilt/route-profiles-geoextract
          ls -la route-profiles/prebuilt/

      - name: Build OpenWrt package
        uses: openwrt/gh-action-sdk@v9
        env:
          # Feed names must be [A-Za-z0-9_]+ — hyphens break feeds.conf (prior CI failure)
          ARCH: ${{ matrix.arch }}-${{ matrix.version }}
          FEEDNAME: routeprofiles
          PACKAGES: route-profiles
          # Skip luci/packages/routing feeds; deps resolved from SDK — large speedup
          NO_DEFAULT_FEEDS: 1
          NO_REFRESH_CHECK: 1
          NO_SHFMT_CHECK: 1
          V: s

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: route-profiles-${{ matrix.arch }}-${{ matrix.version }}
          path: bin/packages/**/*.ipk
          if-no-files-found: error
          retention-days: 14

  # Optional 23.05 (workflow_dispatch + full_matrix only)
  package-23:
    if: github.event_name == 'workflow_dispatch' && inputs.full_matrix
    name: ipk ${{ matrix.arch }} / 23.05.5
    needs: rust
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            rust_artifact: geoextract-x86_64
          - arch: aarch64_cortex-a53
            rust_artifact: geoextract-aarch64
          - arch: arm_cortex-a7_neon-vfpv4
            rust_artifact: geoextract-armv7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.rust_artifact }}
          path: prebuilt-dl
      - run: |
          BIN="$(find prebuilt-dl -type f -name 'route-profiles-geoextract' | head -1)"
          mkdir -p route-profiles/prebuilt
          cp "$BIN" route-profiles/prebuilt/route-profiles-geoextract
          chmod 755 route-profiles/prebuilt/route-profiles-geoextract
      - uses: openwrt/gh-action-sdk@v9
        env:
          ARCH: ${{ matrix.arch }}-23.05.5
          FEEDNAME: routeprofiles
          PACKAGES: route-profiles
          NO_DEFAULT_FEEDS: 1
          NO_REFRESH_CHECK: 1
          NO_SHFMT_CHECK: 1
          V: s
      - uses: actions/upload-artifact@v4
        with:
          name: route-profiles-${{ matrix.arch }}-23.05.5
          path: bin/packages/**/*.ipk
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # 3) Publish IPKs to GitHub Releases
  # -------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: [package, package-23]
    if: |
      always() &&
      needs.package.result == 'success' &&
      (needs.package-23.result == 'success' || needs.package-23.result == 'skipped') &&
      (
        github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
        || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all IPK artifacts
        uses: actions/download-artifact@v4
        with:
          # Matches package job uploads only (not geoextract-*)
          pattern: route-profiles-*
          path: release-ipks
          merge-multiple: false

      - name: Collect and rename IPKs
        id: meta
        run: |
          set -euo pipefail
          mkdir -p dist
          # Keep only the route-profiles package IPKs (skip toolchain leftovers if any)
          find release-ipks -type f -name 'route-profiles_*.ipk' -print0 | while IFS= read -r -d '' f; do
            base="$(basename "$f")"
            # Prefer unique names: already include arch in OpenWrt filename
            cp -f "$f" "dist/$base"
            echo "  + $base"
          done
          count="$(find dist -name '*.ipk' | wc -l | tr -d ' ')"
          echo "Found $count IPK(s)"
          test "$count" -ge 1
          ls -lah dist/

          # Version from Makefile unless this is a v* tag
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            VER="$(sed -n 's/^PKG_VERSION:=//p' route-profiles/Makefile | head -1 | tr -d '[:space:]')"
            REL="$(sed -n 's/^PKG_RELEASE:=//p' route-profiles/Makefile | head -1 | tr -d '[:space:]')"
            TAG="v${VER}"
            # Optional: include release rev in body; tag stays vX.Y.Z for stable URL
            echo "pkg_release=${REL}" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          {
            echo "## route-profiles ${TAG}"
            echo
            echo "OpenWrt IPK packages built from \`${GITHUB_SHA::7}\` on \`${GITHUB_REF_NAME}\`."
            echo
            echo "### Install (example)"
            echo
            echo '```sh'
            echo "scp dist/route-profiles_*_aarch64_cortex-a53.ipk root@openwrt.lan:/tmp/"
            echo "ssh root@openwrt.lan opkg install /tmp/route-profiles_*_aarch64_cortex-a53.ipk"
            echo '```'
            echo
            echo "### Assets"
            echo
            echo "| File | Arch / notes |"
            echo "|------|----------------|"
            for f in dist/*.ipk; do
              b="$(basename "$f")"
              arch="$(echo "$b" | sed -n 's/.*_\([^_][^.]*\)\.ipk/\1/p')"
              echo "| \`$b\` | \`${arch}\` |"
            done
          } > release-notes.md
          cat release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          # Create release if missing; always re-upload assets for this tag
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Updating existing release $TAG"
            # Drop previous route-profiles_*.ipk assets so names stay unique
            mapfile -t OLD < <(gh release view "$TAG" --json assets -q '.assets[].name' | grep -E '^route-profiles_.*\.ipk$' || true)
            for a in "${OLD[@]:-}"; do
              [ -n "$a" ] || continue
              gh release delete-asset "$TAG" "$a" --yes || true
            done
            gh release upload "$TAG" dist/*.ipk --clobber
            gh release edit "$TAG" --notes-file release-notes.md
          else
            echo "Creating release $TAG"
            # main/master builds → prerelease so formal tags can be "latest"
            PRE=()
            if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
              PRE=(--prerelease --latest=false)
            else
              PRE=(--latest)
            fi
            gh release create "$TAG" dist/*.ipk \
              --title "route-profiles ${TAG}" \
              --notes-file release-notes.md \
              "${PRE[@]}"
          fi
          echo "Release URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
